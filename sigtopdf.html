<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- বাংলা font -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Noto Sans Bengali', sans-serif;
    padding: 40px;
}

.container {
    width: 800px;
    margin: auto;
    border: 2px solid #000;
    padding: 20px;
}

.header {
    text-align: center;
    margin-bottom: 20px;
}

.title {
    font-size: 24px;
    font-weight: bold;
}

.info {
    margin-top: 20px;
    font-size: 16px;
}

.row {
    margin-bottom: 10px;
}

.label {
    font-weight: bold;
}

.footer {
    margin-top: 40px;
    text-align: right;
}
</style>

</head>
<body>

<div class="container" id="pdfArea">

    <div class="header">
        <div class="title">📄 HTML to PDF Demo</div>
        <p>বাংলা + Layout Test</p>
    </div>

    <div class="info">
        <div class="row">
            <span class="label">নাম:</span> সাগর
        </div>

        <div class="row">
            <span class="label">আইডি:</span> 123456789
        </div>

        <div class="row">
            <span class="label">ঠিকানা:</span> ঢাকা, বাংলাদেশ
        </div>

        <div class="row">
            <span class="label">তারিখ:</span> 2026-04-07
        </div>
    </div>

    <div class="footer">
        <p>Signature: __________________</p>
    </div>

</div>

</body>
</html>
